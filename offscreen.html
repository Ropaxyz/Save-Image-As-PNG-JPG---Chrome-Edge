<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WebP Converter Offscreen Document</title>
    <!-- connect-src is required: without it, fetch(https://...) falls under default-src 'self' and is blocked. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; img-src * data: blob:; connect-src 'self' http: https: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  </head>
  <body>
    <!--
      This document is loaded invisibly via chrome.offscreen.createDocument.
      It exists solely so we have access to a real DOM <canvas> for decoding
      WebP bytes and re-encoding them as PNG / JPEG.
    -->
    <canvas id="canvas" hidden></canvas>
    <script src="offscreen.js"></script>
  </body>
</html>
